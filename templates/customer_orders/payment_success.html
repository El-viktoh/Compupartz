{% extends "base.html" %}

{% block title %}Payment Successful | Compupartz{% endblock %}

{% block content %}

<div class="max-w-xl mx-auto text-center bg-white p-8 rounded-xl shadow">

    <div class="text-green-600 text-6xl mb-4">✓</div>

    <h1 class="text-3xl font-bold mb-3">
        Payment Successful
    </h1>

    <p class="text-gray-600 mb-6">
        Thank you for your order. Your payment has been confirmed.
    </p>

    <div class="bg-gray-100 p-4 rounded-lg mb-6">
        <p><strong>Order ID:</strong> #{{ order.id }}</p>
        <p><strong>Total Paid:</strong> GHS {{ order.total_amount }}</p>
    </div>

    <a
        href="{% url 'track_order' order.id %}"
        class="inline-block bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition"
    >
        Track Your Order
    </a>

</div>

{% endblock %}
