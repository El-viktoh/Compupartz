{% extends "base.html" %}
{% load static %}

{% block title %}Reset Password | Compupartz{% endblock %}

{% block content %}
<div class="relative -mx-6 px-6 sm:-mx-0 sm:px-0 sm:w-screen sm:left-1/2 sm:-translate-x-1/2 bg-gray-50 dark:bg-[#0a0a0c] text-gray-900 dark:text-white -mt-10 py-24 min-h-[80vh] flex flex-col items-center justify-center transition-colors duration-500 overflow-hidden">
    
    <!-- Background Accents -->
    <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-[#008BC6]/5 rounded-full blur-[120px] -z-10 animate-pulseGlow"></div>
    <div class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-[#ff7200]/5 rounded-full blur-[100px] -z-10 animate-pulseGlow"></div>

    <div class="w-full max-w-md px-6 relative z-10">
        <!-- HEADER -->
        <div class="text-center mb-10">
            <h4 class="text-[10px] font-black uppercase tracking-[0.3em] text-[#ff7200] mb-4">Security Center</h4>
            <h1 class="text-3xl md:text-4xl font-outfit font-black mb-4 uppercase tracking-widest text-gray-900 dark:text-white">
                FORGOT <span class="text-[#ff7200]">PASSWORD?</span>
            </h1>
            <p class="text-gray-500 dark:text-gray-400 font-light text-sm tracking-wide">
                Enter your email address below and we'll send you a link to reset your account access.
            </p>
        </div>

        <!-- FORM CARD -->
        <div class="bg-white/80 dark:bg-white/5 backdrop-blur-2xl border border-gray-200 dark:border-white/10 p-8 md:p-10 rounded-[2.5rem] shadow-xl dark:shadow-2xl relative overflow-hidden group">
            <form method="POST" class="space-y-6">
                {% csrf_token %}
                
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 dark:text-[#ff7200]/80 ml-1">Email Address</label>
                    <input type="email" name="email" autocomplete="email" required id="id_email"
                        class="w-full bg-gray-100 dark:bg-white/5 border border-transparent focus:border-[#ff7200]/50 rounded-2xl px-6 py-4 text-sm outline-none transition-all placeholder:text-gray-400 dark:placeholder:text-gray-600 focus:ring-4 focus:ring-[#ff7200]/10"
                        placeholder="your@email.com">
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-[#ff7200] to-orange-600 hover:from-orange-600 hover:to-orange-700 shadow-[0_0_20px_rgba(255,114,0,0.3)] text-white py-5 rounded-2xl font-black uppercase tracking-[0.2em] transition-all transform hover:-translate-y-1 active:scale-95 text-xs shadow-orange-500/30">
                    Send Reset Link
                </button>
            </form>

            <div class="mt-8 text-center">
                <a href="{% url 'login' %}" class="text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors">
                    &larr; Back to Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
