{% extends "base.html" %}
{% load static %}

{% block title %}Password Reset Complete | Compupartz{% endblock %}

{% block content %}
<div class="relative -mx-6 px-6 sm:-mx-0 sm:px-0 sm:w-screen sm:left-1/2 sm:-translate-x-1/2 bg-gray-50 dark:bg-[#0a0a0c] text-gray-900 dark:text-white -mt-10 py-24 min-h-[80vh] flex flex-col items-center justify-center transition-colors duration-500 overflow-hidden">
    
    <div class="w-full max-w-md px-6 text-center">
        <!-- ICON -->
        <div class="inline-flex w-20 h-20 bg-[#ff7200]/10 rounded-full items-center justify-center mb-8 border border-[#ff7200]/20">
            <svg class="w-10 h-10 text-[#ff7200]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </div>

        <h1 class="text-3xl font-outfit font-black mb-4 uppercase tracking-widest text-gray-900 dark:text-white">
            SUCCESSFULLY <span class="text-[#ff7200]">RESET</span>
        </h1>
        <p class="text-gray-500 dark:text-gray-400 font-light text-sm tracking-wide mb-10 leading-relaxed">
            Your password has been changed successfully. You can now log in with your new credentials.
        </p>

        <a href="{% url 'login' %}" class="inline-block bg-[#ff7200] text-white px-10 py-5 rounded-full font-black uppercase tracking-widest text-[10px] hover:scale-105 transition-transform shadow-xl shadow-orange-500/20">
             Log In Now
        </a>
    </div>
</div>
{% endblock %}
