{% extends "base.html" %}
{% load static %}

{% block title %}Email Sent | Compupartz{% endblock %}

{% block content %}
<div class="relative -mx-6 px-6 sm:-mx-0 sm:px-0 sm:w-screen sm:left-1/2 sm:-translate-x-1/2 bg-gray-50 dark:bg-[#0a0a0c] text-gray-900 dark:text-white -mt-10 py-24 min-h-[80vh] flex flex-col items-center justify-center transition-colors duration-500 overflow-hidden">
    
    <div class="w-full max-w-md px-6 text-center">
        <!-- ICON -->
        <div class="inline-flex w-20 h-20 bg-green-500/10 rounded-full items-center justify-center mb-8 border border-green-500/20">
            <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
        </div>

        <h1 class="text-3xl font-outfit font-black mb-4 uppercase tracking-widest text-gray-900 dark:text-white">
            LINK <span class="text-green-500">SENT</span>
        </h1>
        <p class="text-gray-500 dark:text-gray-400 font-light text-sm tracking-wide mb-10 leading-relaxed">
            We've sent an email with instructions to reset your password. If it doesn't arrive in a few minutes, please check your spam folder.
        </p>

        <a href="{% url 'login' %}" class="inline-block bg-gray-900 dark:bg-white text-white dark:text-black px-10 py-4 rounded-full font-black uppercase tracking-widest text-[10px] hover:scale-105 transition-transform shadow-xl">
             Back to Login
        </a>
    </div>
</div>
{% endblock %}
