{% extends "base.html" %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-24 px-4 relative overflow-hidden">
    <!-- Background Decor -->
    <div class="absolute -top-24 -right-24 w-96 h-96 bg-red-500/5 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="max-w-md w-full bg-white dark:bg-white/5 backdrop-blur-xl border border-gray-100 dark:border-white/10 rounded-[2.5rem] p-12 text-center shadow-2xl relative z-10">
        <div class="w-24 h-24 bg-red-500/10 rounded-3xl flex items-center justify-center mx-auto mb-8">
            <span class="text-4xl">⚠️</span>
        </div>

        <h1 class="text-3xl font-black text-gray-900 dark:text-white uppercase tracking-tighter mb-4">Link Invalid</h1>
        
        <p class="text-gray-500 dark:text-gray-400 mb-8 leading-relaxed">
            This activation link is either invalid, has expired, or has already been used. Please try signing up again or contact support if you need assistance.
        </p>

        <a href="{% url 'signup' %}" class="block w-full bg-gray-900 dark:bg-white text-white dark:text-black py-4 rounded-2xl font-black uppercase tracking-widest text-xs hover:scale-[1.02] transform transition-all active:scale-95 mb-4">
            Request New Link
        </a>

        <a href="{% url 'login' %}" class="inline-flex items-center gap-2 text-sm font-bold text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors">
            Back to Login
        </a>
    </div>
</div>
{% endblock %}
